# =============================================================================
# my-little-pony — stack completo em um único compose.
#
#   docker compose up -d                 → sobe a APP inteira (infra + api + web)
#   docker compose --profile rag up -d   → sobe TAMBÉM a busca/RAG (Python + Qdrant + Ollama)
#
# App:            http://localhost:3000
# API (Swagger):  http://localhost:3333/docs
# Mailpit:        http://localhost:8025
# RabbitMQ:       http://localhost:15682  (guest/guest)
# MinIO console:  http://localhost:9011   (mlp/mlpsecret123)
#
# Portas publicadas no host usam offset +10 para coexistir com outros stacks locais.
# Dentro da rede do compose os serviços falam pelas portas padrão (5432, 6379, ...).
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # Infraestrutura
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: mlp
      POSTGRES_PASSWORD: mlp
      POSTGRES_DB: mlp
    ports:
      - "5442:5432"
    volumes:
      - mlp_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mlp"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6389:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  rabbitmq:
    image: rabbitmq:3-management-alpine
    ports:
      - "5682:5672"
      - "15682:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: mlp
      MINIO_ROOT_PASSWORD: mlpsecret123
    ports:
      - "9010:9000"
      - "9011:9001"
    volumes:
      - mlp_minio:/data
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 10

  # Catcher de e-mails para dev: recebe via SMTP (1025) e mostra na UI (8025).
  mailpit:
    image: axllent/mailpit
    ports:
      - "1025:1025"
      - "8025:8025"

  # ---------------------------------------------------------------------------
  # Aplicações
  # ---------------------------------------------------------------------------
  api:
    build:
      context: .
      dockerfile: Dockerfile.apps
    command: pnpm nx serve @my-little-pony/api
    ports:
      - "3333:3333"
    environment:
      PORT: 3333
      # Infra via DNS interno do compose (portas padrão, sem offset).
      DATABASE_URL: postgres://mlp:mlp@postgres:5432/mlp
      REDIS_URL: redis://redis:6379
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_ACCESS_KEY: mlp
      MINIO_SECRET_KEY: mlpsecret123
      MINIO_BUCKET: avatars
      MINIO_SOURCE_FILE_BUCKET: source-files
      SMTP_HOST: mailpit
      SMTP_PORT: 1025
      SMTP_SECURE: "false"
      MAIL_FROM: my-little-pony <no-reply@mlp.local>
      # URLs vistas pelo BROWSER (host), não pela rede interna.
      WEB_ORIGIN: http://localhost:3000
      API_PUBLIC_URL: http://localhost:3333
      # Segredos — DEV ONLY. Em produção, sobrescreva com valores fortes (>=32 chars).
      JWT_ACCESS_SECRET: ${MLP_JWT_ACCESS_SECRET:-dev_access_secret_change_me_0123456789abcd}
      JWT_REFRESH_SECRET: ${MLP_JWT_REFRESH_SECRET:-dev_refresh_secret_change_me_0123456789abc}
      INTERNAL_API_TOKEN: ${MLP_INTERNAL_API_TOKEN:-dev_internal_service_token_0123456789abcdef}
      # Busca/RAG: preenchido só quando o profile `rag` está ativo (senão degrada).
      SEARCH_SERVICE_URL: ${MLP_SEARCH_SERVICE_URL:-}
      SEARCH_SERVICE_TOKEN: ${MLP_SEARCH_SERVICE_TOKEN:-dev_search_service_token_0123456789abcd}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      minio:
        condition: service_healthy
      mailpit:
        condition: service_started
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3333/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

  web:
    build:
      context: .
      dockerfile: Dockerfile.apps
    command: pnpm nx dev web --hostname=0.0.0.0 --port=3000
    ports:
      - "3000:3000"
    environment:
      # Lida pelo browser: a API é publicada em localhost:3333 no host.
      NEXT_PUBLIC_API_URL: http://localhost:3333
      # Lida no servidor (SSR da página pública): DNS interno do compose.
      API_URL_INTERNAL: http://api:3333
    depends_on:
      api:
        condition: service_started

  # ---------------------------------------------------------------------------
  # Busca + RAG (profile `rag`) — pesado (modelos ML). Só sobe com --profile rag.
  # ---------------------------------------------------------------------------
  qdrant:
    image: qdrant/qdrant:latest
    profiles: ["rag"]
    ports:
      - "6343:6333"
      - "6344:6334"
    volumes:
      - mlp_qdrant:/qdrant/storage

  # LLM local para o RAG generativo (/answer). Puxe o modelo uma vez:
  #   docker compose --profile rag exec ollama ollama pull qwen2.5:7b-instruct
  # Sem GPU roda em CPU (mais lento); para GPU, veja docker-compose.gpu.yml.
  # (Alternativa: use uma API hospedada via MLP_LLM_BACKEND=openai — sem Ollama.)
  ollama:
    image: ollama/ollama:latest
    profiles: ["rag"]
    ports:
      - "11434:11434"
    volumes:
      - mlp_ollama:/root/.ollama
    # GPU: opt-in pelo overlay docker-compose.gpu.yml (requer NVIDIA Container
    # Toolkit). Ex.: docker compose -f docker-compose.yml -f docker-compose.gpu.yml \
    #                --profile rag up -d

  rag-worker:
    build:
      context: ./apps/rag-service
      dockerfile: Dockerfile
    profiles: ["rag"]
    command: python -m rag_service.main_worker
    # Cache dos modelos ML (bge-m3, reranker) num volume nomeado: baixa ~4 GB
    # UMA vez e reusa entre recriações/reinícios (e compartilhado com rag-api).
    # Sem isso, todo recreate re-baixa os modelos (minutos no 1º /answer).
    volumes: &rag_volumes
      - mlp_hf_cache:/root/.cache/huggingface
    environment: &rag_env
      # Device dos modelos locais (embedders/reranker). Default cpu (portável).
      # Para GPU: RAG_DEVICE=cuda + o overlay docker-compose.gpu.yml.
      RAG_DEVICE: ${MLP_RAG_DEVICE:-cpu}
      RAG_QDRANT_URL: http://qdrant:6333
      RAG_QDRANT_COLLECTION: documents
      RAG_RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      RAG_MINIO_ENDPOINT: minio:9000
      RAG_MINIO_ACCESS_KEY: mlp
      RAG_MINIO_SECRET_KEY: mlpsecret123
      RAG_MINIO_BUCKET: source-files
      RAG_MINIO_SECURE: "false"
      RAG_NEST_BASE_URL: http://api:3333
      RAG_NEST_SERVICE_TOKEN: ${MLP_INTERNAL_API_TOKEN:-dev_internal_service_token_0123456789abcdef}
      RAG_SERVICE_API_TOKEN: ${MLP_SEARCH_SERVICE_TOKEN:-dev_search_service_token_0123456789abcd}
      # Backend do LLM: "ollama" (default, local) ou "openai" (API compatível:
      # OpenAI, Groq, OpenRouter, vLLM...). Para API, defina MLP_LLM_API_BASE/KEY.
      RAG_LLM_BACKEND: ${MLP_LLM_BACKEND:-ollama}
      RAG_LLM_MODEL: ${MLP_LLM_MODEL:-qwen2.5:7b-instruct}
      RAG_OLLAMA_URL: http://ollama:11434/api/chat
      RAG_LLM_API_BASE: ${MLP_LLM_API_BASE:-}
      RAG_LLM_API_KEY: ${MLP_LLM_API_KEY:-}
    depends_on:
      rabbitmq:
        condition: service_healthy
      minio:
        condition: service_healthy
      qdrant:
        condition: service_started

  rag-api:
    build:
      context: ./apps/rag-service
      dockerfile: Dockerfile
    profiles: ["rag"]
    command: python -m uvicorn rag_service.adapters.inbound.search_api:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    volumes: *rag_volumes
    environment: *rag_env
    depends_on:
      qdrant:
        condition: service_started
      ollama:
        condition: service_started

volumes:
  mlp_pg:
  mlp_minio:
  mlp_qdrant:
  mlp_ollama:
  mlp_hf_cache:
