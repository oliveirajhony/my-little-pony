services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: mlp
      POSTGRES_PASSWORD: mlp
      POSTGRES_DB: mlp
    ports:
      # Host ports offset (+10) so this stack coexists with other local stacks
      # (e.g. projeto1) that already bind the defaults.
      - "5442:5432"
    volumes:
      - mlp_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mlp"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6389:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  rabbitmq:
    image: rabbitmq:3-management-alpine
    ports:
      - "5682:5672"
      - "15682:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: mlp
      MINIO_ROOT_PASSWORD: mlpsecret123
    ports:
      # +10 offset (API 9010, console 9011) to coexist with other local stacks.
      - "9010:9000"
      - "9011:9001"
    volumes:
      - mlp_minio:/data
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 10

  # Catcher de e-mails para dev: recebe via SMTP (1025) e mostra na UI (8025).
  mailpit:
    image: axllent/mailpit
    ports:
      - "1025:1025"
      - "8025:8025"

  # Vector store for the Python RAG service (apps/rag-service).
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      # +10 offset (HTTP 6343, gRPC 6344) to coexist with other local stacks.
      - "6343:6333"
      - "6344:6334"
    volumes:
      - mlp_qdrant:/qdrant/storage

volumes:
  mlp_pg:
  mlp_minio:
  mlp_qdrant:
