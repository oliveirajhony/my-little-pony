services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: mlp
      POSTGRES_PASSWORD: mlp
      POSTGRES_DB: mlp
    ports:
      # Host ports offset (+10) so this stack coexists with other local stacks
      # (e.g. projeto1) that already bind the defaults.
      - "5442:5432"
    volumes:
      - mlp_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mlp"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6389:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  rabbitmq:
    image: rabbitmq:3-management-alpine
    ports:
      - "5682:5672"
      - "15682:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  mlp_pg:
